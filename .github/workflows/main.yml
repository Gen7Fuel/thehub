name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      auth-backend: ${{ steps.filter.outputs.auth-backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      backend-image: ${{ steps.images.outputs.backend-image }}
      auth-backend-image: ${{ steps.images.outputs.auth-backend-image }}
      owner: ${{ steps.images.outputs.owner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            auth-backend:
              - 'auth-backend/**'
            frontend:
              - 'frontend/**'

      - id: images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${OWNER}" >> $GITHUB_OUTPUT
          if [ "${{ steps.filter.outputs.backend }}" = "true" ]; then
            echo "backend-image=ghcr.io/${OWNER}/thehub-backend:${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "backend-image=ghcr.io/${OWNER}/thehub-backend:latest" >> $GITHUB_OUTPUT
          fi
          if [ "${{ steps.filter.outputs.auth-backend }}" = "true" ]; then
            echo "auth-backend-image=ghcr.io/${OWNER}/thehub-auth-backend:${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "auth-backend-image=ghcr.io/${OWNER}/thehub-auth-backend:latest" >> $GITHUB_OUTPUT
          fi

  build-frontend:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.frontend == 'true'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          rm -rf dist
          npm run build

      - id: version
        run: echo "version=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-backend:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.backend == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ needs.check-changes.outputs.backend-image }}
            ghcr.io/${{ needs.check-changes.outputs.owner }}/thehub-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-auth-backend:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.auth-backend == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth-backend
        uses: docker/build-push-action@v6
        with:
          context: ./auth-backend
          push: true
          tags: |
            ${{ needs.check-changes.outputs.auth-backend-image }}
            ghcr.io/${{ needs.check-changes.outputs.owner }}/thehub-auth-backend:latest
          cache-from: type=gha,scope=auth-backend
          cache-to: type=gha,mode=max,scope=auth-backend

  # ==========================================
  # CONSOLIDATED DEPLOYMENT
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: [check-changes, build-frontend, build-backend, build-auth-backend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    steps:
      - uses: actions/checkout@v4

      - name: Download Frontend Artifact
        if: needs.check-changes.outputs.frontend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend-dist

      - name: Package Frontend Assets
        if: needs.check-changes.outputs.frontend == 'true'
        run: tar -czf frontend.tar.gz -C ./frontend-dist .

      - name: Transfer Frontend Package
        if: needs.check-changes.outputs.frontend == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend.tar.gz"
          target: "/tmp/"

      - name: Execute Server Deployment Pipeline
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/gen7fuel/thehub

            # ---- 1. Sync Core Configuration Files First ----
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            git pull origin main

            # ---- 2. Global Environment Injection (Prevents Compose validation crashes) ----
            export BACKEND_IMAGE="${{ needs.check-changes.outputs.backend-image }}"
            export AUTH_BACKEND_IMAGE="${{ needs.check-changes.outputs.auth-backend-image }}"
            export MONGO_URI="${{ secrets.MONGO_URI }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export SQL_SERVER="${{ secrets.SQL_SERVER }}"
            export SQL_DB="${{ secrets.SQL_DB }}"
            export SQL_USER="${{ secrets.SQL_USER }}"
            export SQL_PASSWORD="${{ secrets.SQL_PASSWORD }}"
            export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
            export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            export REDIS_URL="${{ secrets.REDIS_URL }}"
            export AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
            export AZURE_CONTAINER="${{ secrets.AZURE_CONTAINER }}"
            export AZURE_CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}"
            export AZURE_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}"
            export AZURE_CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET }}"
            export EMAIL_SERVICE_URL="http://email-service:2525"
            export EMAIL_SERVICE_API_KEY="${{ secrets.EMAIL_SERVICE_API_KEY }}"
            export INTACCT_CLIENT_ID="${{ secrets.INTACCT_CLIENT_ID }}"
            export INTACCT_CLIENT_SECRET="${{ secrets.INTACCT_CLIENT_SECRET }}"
            export INTACCT_CALLBACK_URL="${{ secrets.INTACCT_CALLBACK_URL }}"
            export CDN_ADMIN_TOKEN="${{ secrets.CDN_ADMIN_TOKEN }}"
            export ACADEMY_ADMIN_TOKEN="${{ secrets.ACADEMY_ADMIN_TOKEN }}"
            export NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
            export SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
            export GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}"

            # ---- 3. Infrastructure Isolation Guard ----
            echo "Verifying database infrastructure..."
            docker compose up -d postgres

            # ---- 4. Zero-Downtime Warmup (Pre-pull registry updates background) ----
            if [ "${{ needs.check-changes.outputs.auth-backend }}" = "true" ]; then
                echo "Pre-fetching updated auth-backend layer..."
                docker pull $AUTH_BACKEND_IMAGE
            fi
            if [ "${{ needs.check-changes.outputs.backend }}" = "true" ]; then
                echo "Pre-fetching updated main backend layer..."
                docker pull $BACKEND_IMAGE
            fi

            # ---- 5. Hot Swapping Container Lifecycles (<1s Downtime) ----
            if [ "${{ needs.check-changes.outputs.auth-backend }}" = "true" ]; then
                echo "Swapping Auth-backend instance..."
                docker compose up -d --no-deps auth-backend
            fi

            if [ "${{ needs.check-changes.outputs.backend }}" = "true" ]; then
                echo "Swapping Main Backend instance..."
                docker compose up -d --no-deps backend
                
                if docker compose ps --services | grep -q '^postgres$'; then
                    echo "Running relational engine incremental schemas..."
                    docker compose exec -T backend node scripts/pg-migrate.js
                fi
            fi

            # ---- 6. Atomic Routing Layer Refresh (Caddy) ----
            echo "Validating edge-routing runtime config..."
            docker exec -i webserver sh -c "cat > /etc/caddy/Caddyfile.new" < /home/gen7fuel/thehub/Caddyfile
            if docker exec webserver caddy validate --config /etc/caddy/Caddyfile.new; then
                docker exec webserver sh -c "cat /etc/caddy/Caddyfile.new > /etc/caddy/Caddyfile"
                docker exec webserver caddy reload --config /etc/caddy/Caddyfile
                docker exec webserver rm /etc/caddy/Caddyfile.new
                echo "Routing engine hot-reloaded seamlessly."
            else
                echo "CRITICAL: Validation errors caught inside new routing config context."
                docker exec webserver rm /etc/caddy/Caddyfile.new
                exit 1
            fi

            # ---- 7. Static Frontend Distribution Swapping ----
            if [ "${{ needs.check-changes.outputs.frontend }}" = "true" ]; then
                VERSION="${{ needs.build-frontend.outputs.version }}"
                NEW_DIR="/var/www/thehub/$VERSION"
                
                echo "Unpacking production static asset distribution to $NEW_DIR..."
                sudo mkdir -p $NEW_DIR
                sudo tar -xzf /tmp/frontend.tar.gz -C $NEW_DIR
                sudo chown -R gen7fuel:gen7fuel $NEW_DIR
                sudo chmod -R 755 $NEW_DIR
                
                cd /var/www/thehub
                echo "Executing atomic symlink rollover to $VERSION..."
                sudo ln -sfn $VERSION dist_current
                
                # Housekeeping: Keep top 3 historical active versions
                ls -1dt 202* | tail -n +4 | xargs sudo rm -rf 2>/dev/null || true
                sudo rm -f /tmp/frontend.tar.gz
            fi

            # ---- 8. Memory Store Persistence Check (Redis) ----
            docker exec -i redis redis-cli replicaof no one
            docker exec -i redis redis-cli SAVE
            echo "Pipeline successfully terminated."