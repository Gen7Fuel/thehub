name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  # Computes lowercase image names once; build-backend and build-auth-backend depend on it.
  # Runs in ~5s so it barely delays the parallel build jobs.
  setup:
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.images.outputs.backend-image }}
      auth-backend-image: ${{ steps.images.outputs.auth-backend-image }}
    steps:
      - id: images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend-image=ghcr.io/${OWNER}/thehub-backend:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "auth-backend-image=ghcr.io/${OWNER}/thehub-auth-backend:${{ github.sha }}" >> $GITHUB_OUTPUT

  # Runs in parallel with build-backend and build-auth-backend
  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          rm -rf dist
          npm run build

      - id: version
        run: echo "version=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Copy frontend build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend/dist/*"
          strip_components: 2
          target: "/tmp/frontend-dist/${{ steps.version.outputs.version }}"

  # Runs in parallel with build-frontend and build-auth-backend
  build-backend:
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ needs.setup.outputs.backend-image }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # Runs in parallel with build-frontend and build-backend
  build-auth-backend:
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth-backend
        uses: docker/build-push-action@v6
        with:
          context: ./auth-backend
          push: true
          tags: ${{ needs.setup.outputs.auth-backend-image }}
          cache-from: type=gha,scope=auth-backend
          cache-to: type=gha,mode=max,scope=auth-backend

  # Runs after all three build jobs complete
  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend, build-auth-backend, setup]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /home/gen7fuel/thehub

            # ---- Login to GHCR to pull private images ----
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # ---- Pull backend ----
            git pull origin main

            # ---- Image references (built in CI) ----
            export BACKEND_IMAGE=${{ needs.setup.outputs.backend-image }}
            export AUTH_BACKEND_IMAGE=${{ needs.setup.outputs.auth-backend-image }}

            # ---- Export env vars ----
            export MONGO_URI=${{ secrets.MONGO_URI }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export SQL_SERVER=${{ secrets.SQL_SERVER }}
            export SQL_DB=${{ secrets.SQL_DB }}
            export SQL_USER=${{ secrets.SQL_USER }}
            export SQL_PASSWORD=${{ secrets.SQL_PASSWORD }}
            export POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            export POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            export REDIS_URL=${{ secrets.REDIS_URL }}
            # export SFTP_HOST=${{ secrets.SFTP_HOST }}
            # export SFTP_PORT=${{ secrets.SFTP_PORT }}
            # export SFTP_COUCHICHING_USER=${{ secrets.SFTP_COUCHICHING_USER }}
            # export SFTP_COUCHICHING_PASS=${{ secrets.SFTP_COUCHICHING_PASS }}
            # export SFTP_RANKIN_USER=${{ secrets.SFTP_RANKIN_USER }}
            # export SFTP_RANKIN_PASS=${{ secrets.SFTP_RANKIN_PASS }}
            # export SFTP_JOCKO_POINT_USER=${{ secrets.SFTP_JOCKO_POINT_USER }}
            # export SFTP_JOCKO_POINT_PASS=${{ secrets.SFTP_JOCKO_POINT_PASS }}
            # export SFTP_WALPOLE_USER=${{ secrets.SFTP_WALPOLE_USER }}
            # export SFTP_WALPOLE_PASS=${{ secrets.SFTP_WALPOLE_PASS }}
            # export SFTP_SARNIA_USER=${{ secrets.SFTP_SARNIA_USER }}
            # export SFTP_SARNIA_PASS=${{ secrets.SFTP_SARNIA_PASS }}
            # export SFTP_SILVER_GRIZZLY_USER=${{ secrets.SFTP_SILVER_GRIZZLY_USER }}
            # export SFTP_SILVER_GRIZZLY_PASS=${{ secrets.SFTP_SILVER_GRIZZLY_PASS }}
            # export SFTP_OLIVER_USER=${{ secrets.SFTP_OLIVER_USER }}
            # export SFTP_OLIVER_PASS=${{ secrets.SFTP_OLIVER_PASS }}
            # export SFTP_OSOYOOS_USER=${{ secrets.SFTP_OSOYOOS_USER }}
            # export SFTP_OSOYOOS_PASS=${{ secrets.SFTP_OSOYOOS_PASS }}
            export AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
            export AZURE_CONTAINER=${{ secrets.AZURE_CONTAINER }}
            export AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
            export AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
            export AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
            export NOREPLY_PASS=${{ secrets.NOREPLY_PASS }}
            export INTACCT_CLIENT_ID=${{ secrets.INTACCT_CLIENT_ID }}
            export INTACCT_CLIENT_SECRET=${{ secrets.INTACCT_CLIENT_SECRET }}
            export INTACCT_CALLBACK_URL=${{ secrets.INTACCT_CALLBACK_URL }}
            export CDN_ADMIN_TOKEN=${{ secrets.CDN_ADMIN_TOKEN }}
            export ACADEMY_ADMIN_TOKEN=${{ secrets.ACADEMY_ADMIN_TOKEN }}
            export NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            export SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            export GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}

            # ---- Pull pre-built images from GHCR ----
            docker pull $BACKEND_IMAGE
            docker pull $AUTH_BACKEND_IMAGE

            # ---- Ensure Postgres is running before backend deploy ----
            echo "Starting postgres..."
            if docker compose up -d --wait postgres; then
                echo "SUCCESS: Postgres is healthy."
            else
                echo "FATAL: Postgres failed health check!"
                docker logs postgres --tail 50
                exit 1
            fi

            # ---- 1. Deploy Auth-Backend ----
            echo "Deploying auth-backend..."
            if docker compose up -d --no-deps --wait auth-backend; then
                echo "SUCCESS: Auth-backend is healthy."
            else
                echo "FATAL: Auth-backend failed health check!"
                docker logs auth-backend --tail 50
                exit 1
            fi

            # ---- 2. Deploy Main Backend ----
            echo "Deploying backend..."
            if docker compose up -d --no-deps --wait backend; then
                echo "SUCCESS: Backend is healthy."
            else
                echo "FATAL: Backend failed health check!"
                docker logs backend --tail 50
                exit 1
            fi

            # ---- Postgres migrations ----
            if docker compose ps --services | grep -q '^postgres$'; then
              echo "Running Postgres migrations..."
              docker compose exec -T backend node scripts/pg-migrate.js
            else
              echo "Skipping Postgres migrations (no postgres service in compose.yaml)."
            fi

            # ---- Frontend zero-downtime update ----
            VERSION=${{ needs.build-frontend.outputs.version }}
            TMP_DIR=/tmp/frontend-dist/$VERSION
            NEW_DIR=/var/www/thehub/$VERSION

            sudo rm -rf $NEW_DIR
            sudo mkdir -p $NEW_DIR
            sudo cp -rp $TMP_DIR/. $NEW_DIR/
            sudo chown -R gen7fuel:gen7fuel $NEW_DIR
            sudo chmod -R 755 $NEW_DIR

            cd /var/www/thehub
            sudo ln -sfn $VERSION dist_current

            # ---- Safe Caddy update ----
            echo "Validating new Caddyfile..."
            docker exec -i webserver sh -c "cat > /etc/caddy/Caddyfile.new" < /home/gen7fuel/thehub/Caddyfile

            if docker exec webserver caddy validate --config /etc/caddy/Caddyfile.new; then
                echo "Validation passed. Applying new config..."
                docker exec webserver sh -c "cat /etc/caddy/Caddyfile.new > /etc/caddy/Caddyfile"
                docker exec webserver caddy reload --config /etc/caddy/Caddyfile
                docker exec webserver rm /etc/caddy/Caddyfile.new
                echo "Caddy reloaded successfully."
            else
                echo "FATAL: New Caddyfile has syntax errors!"
                docker exec webserver rm /etc/caddy/Caddyfile.new
                exit 1
            fi

            # ---- Cleanup ----
            cd /var/www/thehub && ls -1dt 202* | tail -n +4 | xargs sudo rm -rf
            sudo rm -rf /tmp/frontend-dist/

            # ---- Redis safety ----
            docker exec -i redis redis-cli replicaof no one
            docker exec -i redis redis-cli SAVE
