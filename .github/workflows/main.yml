name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      auth-backend: ${{ steps.filter.outputs.auth-backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      backend-image: ${{ steps.images.outputs.backend-image }}
      auth-backend-image: ${{ steps.images.outputs.auth-backend-image }}
      owner: ${{ steps.images.outputs.owner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            auth-backend:
              - 'auth-backend/**'
            frontend:
              - 'frontend/**'

      - id: images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${OWNER}" >> $GITHUB_OUTPUT
          if [ "${{ steps.filter.outputs.backend }}" = "true" ]; then
            echo "backend-image=ghcr.io/${OWNER}/thehub-backend:${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "backend-image=ghcr.io/${OWNER}/thehub-backend:latest" >> $GITHUB_OUTPUT
          fi
          if [ "${{ steps.filter.outputs.auth-backend }}" = "true" ]; then
            echo "auth-backend-image=ghcr.io/${OWNER}/thehub-auth-backend:${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "auth-backend-image=ghcr.io/${OWNER}/thehub-auth-backend:latest" >> $GITHUB_OUTPUT
          fi

  # Only runs when frontend/** changed
  build-frontend:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.frontend == 'true'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          rm -rf dist
          npm run build

      - id: version
        run: echo "version=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Copy frontend build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend/dist/*"
          strip_components: 2
          target: "/tmp/frontend-dist/${{ steps.version.outputs.version }}"

  # Only runs when backend/** changed
  build-backend:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.backend == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ needs.check-changes.outputs.backend-image }}
            ghcr.io/${{ needs.check-changes.outputs.owner }}/thehub-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # Only runs when auth-backend/** changed
  build-auth-backend:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.auth-backend == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth-backend
        uses: docker/build-push-action@v6
        with:
          context: ./auth-backend
          push: true
          tags: |
            ${{ needs.check-changes.outputs.auth-backend-image }}
            ghcr.io/${{ needs.check-changes.outputs.owner }}/thehub-auth-backend:latest
          cache-from: type=gha,scope=auth-backend
          cache-to: type=gha,mode=max,scope=auth-backend

  # Runs as long as neither build failed — skipped builds are fine
  deploy-backends:
    runs-on: ubuntu-latest
    needs: [build-backend, build-auth-backend, check-changes]
    if: |
      always() &&
      needs.build-backend.result != 'failure' &&
      needs.build-auth-backend.result != 'failure'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backends via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /home/gen7fuel/thehub

            # ---- Login to GHCR to pull private images ----
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # ---- Pull latest config (compose.yaml, Caddyfile, etc.) ----
            git pull origin main

            # ---- Image references (built in CI or latest fallback) ----
            export BACKEND_IMAGE=${{ needs.check-changes.outputs.backend-image }}
            export AUTH_BACKEND_IMAGE=${{ needs.check-changes.outputs.auth-backend-image }}

            BACKEND_CHANGED=${{ needs.check-changes.outputs.backend }}
            AUTH_BACKEND_CHANGED=${{ needs.check-changes.outputs.auth-backend }}

            # ---- Export env vars ----
            export MONGO_URI=${{ secrets.MONGO_URI }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export SQL_SERVER=${{ secrets.SQL_SERVER }}
            export SQL_DB=${{ secrets.SQL_DB }}
            export SQL_USER=${{ secrets.SQL_USER }}
            export SQL_PASSWORD=${{ secrets.SQL_PASSWORD }}
            export POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            export POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            export REDIS_URL=${{ secrets.REDIS_URL }}
            export AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
            export AZURE_CONTAINER=${{ secrets.AZURE_CONTAINER }}
            export AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
            export AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
            export AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
            export NOREPLY_PASS=${{ secrets.NOREPLY_PASS }}
            export INTACCT_CLIENT_ID=${{ secrets.INTACCT_CLIENT_ID }}
            export INTACCT_CLIENT_SECRET=${{ secrets.INTACCT_CLIENT_SECRET }}
            export INTACCT_CALLBACK_URL=${{ secrets.INTACCT_CALLBACK_URL }}
            export CDN_ADMIN_TOKEN=${{ secrets.CDN_ADMIN_TOKEN }}
            export ACADEMY_ADMIN_TOKEN=${{ secrets.ACADEMY_ADMIN_TOKEN }}
            export NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            export SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            export GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}

            # ---- Ensure Postgres is running before backend deploy ----
            echo "Ensuring Postgres is running..."
            if docker compose up -d --wait postgres; then
                echo "SUCCESS: Postgres is healthy."
            else
                echo "FATAL: Postgres failed health check!"
                docker logs postgres --tail 50
                exit 1
            fi

            # ---- 1. Deploy Auth-Backend (only if changed) ----
            if [ "$AUTH_BACKEND_CHANGED" = "true" ]; then
                echo "Deploying auth-backend (new image: $AUTH_BACKEND_IMAGE)..."
                OLD_AUTH_BACKEND=$(docker inspect --format='{{.Image}}' auth-backend 2>/dev/null || echo "")
                docker pull $AUTH_BACKEND_IMAGE
                if docker compose up -d --no-deps --wait auth-backend; then
                    echo "SUCCESS: Auth-backend is healthy."
                else
                    echo "FATAL: Auth-backend failed health check!"
                    docker logs auth-backend --tail 50
                    if [ -n "$OLD_AUTH_BACKEND" ]; then
                        echo "Rolling back auth-backend to $OLD_AUTH_BACKEND..."
                        export AUTH_BACKEND_IMAGE=$OLD_AUTH_BACKEND
                        docker compose up -d --no-deps auth-backend
                    fi
                    exit 1
                fi
            else
                echo "Skipping auth-backend deploy (no changes)."
            fi

            # ---- 2. Deploy Main Backend (only if changed) ----
            if [ "$BACKEND_CHANGED" = "true" ]; then
                echo "Deploying backend (new image: $BACKEND_IMAGE)..."
                OLD_BACKEND=$(docker inspect --format='{{.Image}}' backend 2>/dev/null || echo "")
                docker pull $BACKEND_IMAGE
                if docker compose up -d --no-deps --wait backend; then
                    echo "SUCCESS: Backend is healthy."
                else
                    echo "FATAL: Backend failed health check!"
                    docker logs backend --tail 50
                    if [ -n "$OLD_BACKEND" ]; then
                        echo "Rolling back backend to $OLD_BACKEND..."
                        export BACKEND_IMAGE=$OLD_BACKEND
                        docker compose up -d --no-deps backend
                    fi
                    exit 1
                fi

                # ---- Postgres migrations (only when backend changed) ----
                if docker compose ps --services | grep -q '^postgres$'; then
                    echo "Running Postgres migrations..."
                    docker compose exec -T backend node scripts/pg-migrate.js
                fi
            else
                echo "Skipping backend deploy (no changes)."
            fi

            # ---- Safe Caddy update ----
            echo "Validating new Caddyfile..."
            docker exec -i webserver sh -c "cat > /etc/caddy/Caddyfile.new" < /home/gen7fuel/thehub/Caddyfile

            if docker exec webserver caddy validate --config /etc/caddy/Caddyfile.new; then
                echo "Validation passed. Applying new config..."
                docker exec webserver sh -c "cat /etc/caddy/Caddyfile.new > /etc/caddy/Caddyfile"
                docker exec webserver caddy reload --config /etc/caddy/Caddyfile
                docker exec webserver rm /etc/caddy/Caddyfile.new
                echo "Caddy reloaded successfully."
            else
                echo "FATAL: New Caddyfile has syntax errors!"
                docker exec webserver rm /etc/caddy/Caddyfile.new
                exit 1
            fi

            # ---- Redis safety ----
            docker exec -i redis redis-cli replicaof no one
            docker exec -i redis redis-cli SAVE

  # Only runs when frontend actually changed
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [build-frontend, check-changes]
    if: |
      always() &&
      needs.check-changes.outputs.frontend == 'true' &&
      needs.build-frontend.result == 'success'
    steps:
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            VERSION=${{ needs.build-frontend.outputs.version }}
            TMP_DIR=/tmp/frontend-dist/$VERSION
            NEW_DIR=/var/www/thehub/$VERSION

            # ---- Move dist to versioned folder ----
            sudo rm -rf $NEW_DIR
            sudo mkdir -p $NEW_DIR
            sudo cp -rp $TMP_DIR/. $NEW_DIR/
            sudo chown -R gen7fuel:gen7fuel $NEW_DIR
            sudo chmod -R 755 $NEW_DIR

            # ---- Atomic symlink swap ----
            cd /var/www/thehub
            sudo ln -sfn $VERSION dist_current

            # ---- Cleanup: keep 3 most recent versions ----
            cd /var/www/thehub && ls -1dt 202* | tail -n +4 | xargs sudo rm -rf
            sudo rm -rf /tmp/frontend-dist/
